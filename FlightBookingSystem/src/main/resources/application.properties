spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flightbooking}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:flightuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:flightpass}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jackson.serialization.write-dates-as-timestamps=false

jwt.secret=${JWT_SECRET:flight-booking-system-secret-key-2024-very-long-and-secure}
jwt.expiration=86400000
