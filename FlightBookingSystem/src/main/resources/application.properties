spring.datasource.url=jdbc:postgresql://localhost:5432/flightbooking
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=flightuser
spring.datasource.password=flightpass
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jackson.serialization.write-dates-as-timestamps=false

jwt.secret=flight-booking-system-secret-key-2024-very-long-and-secure
jwt.expiration=86400000
